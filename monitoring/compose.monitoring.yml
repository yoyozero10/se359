# =============================================================
# SE359 — Monitoring Stack (Prometheus + Grafana + Loki)
# =============================================================
# Cách chạy:
#   docker compose -f monitoring/compose.monitoring.yml up -d
#
# Truy cập:
#   Prometheus:  http://localhost:9090
#   Grafana:     http://localhost:3001  (admin / admin)
# =============================================================

services:

  # ── Prometheus — Thu thập metrics từ backend /metrics ──
  prometheus:
    image: prom/prometheus:latest
    container_name: se359-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'

  # ── Grafana — Dashboard hiển thị metrics + logs ──
  grafana:
    image: grafana/grafana:latest
    container_name: se359-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  # ── Loki — Lưu trữ logs tập trung ──
  loki:
    image: grafana/loki:3.5.0
    container_name: se359-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ── Promtail — Thu thập logs từ Docker containers ──
  promtail:
    image: grafana/promtail:3.5.0
    container_name: se359-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
