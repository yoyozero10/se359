# PostgreSQL Service — ClusterIP (chỉ truy cập nội bộ cluster)
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: se359
  labels:
    app: postgres
    app.kubernetes.io/part-of: se359
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
