# kind cluster config — mở NodePort 30080 cho frontend
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: se359
nodes:
  - role: control-plane
    extraPortMappings:
      # Frontend NodePort → localhost:30080
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Backend NodePort (dự phòng) → localhost:30088
      - containerPort: 30088
        hostPort: 30088
        protocol: TCP
