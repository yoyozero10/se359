# Frontend Service — NodePort (truy cập từ bên ngoài cluster)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: se359
  labels:
    app: frontend
    app.kubernetes.io/part-of: se359
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080    # Truy cập tại http://localhost:30080
      protocol: TCP
      name: http
