# Frontend Deployment — 2 replicas (Nginx serving static files)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: se359
  labels:
    app: frontend
    app.kubernetes.io/part-of: se359
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: se359-frontend:latest
          imagePullPolicy: Never   # Dùng image local (kind load)
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
